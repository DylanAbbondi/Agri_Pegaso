name: Agri CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Agri.slnx
    - name: Build
      run: dotnet build Agri.slnx --no-restore
    - name: Test
      run: dotnet test Agri.slnx --no-build --verbosity normal

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Agri.slnx
    - name: Run Tests with Coverage
      run: dotnet test Agri.slnx --no-restore --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
      
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: csharp
          build-mode: none
        - language: javascript-typescript
          build-mode: none
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

  docker:
    runs-on: ubuntu-latest
    needs: [test, analyze]
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Normalize image owner
      run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

    - name: Build and Push - Edge Worker
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Agri.Edge/Agri.Edge.Worker/Dockerfile
        push: ${{ github.event_name != 'pull_request' }} 
        tags: |
          ghcr.io/${{ env.IMAGE_OWNER }}/agri-edge-worker:latest
          ghcr.io/${{ env.IMAGE_OWNER }}/agri-edge-worker:${{ github.sha }}

    - name: Build and Push - Processing
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Agri.Processing/Agri.Processing.CompositionRoot/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/${{ env.IMAGE_OWNER }}/agri-processing:latest
          ghcr.io/${{ env.IMAGE_OWNER }}/agri-processing:${{ github.sha }}

    - name: Build and Push - ReadModel Blazor
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Agri.ReadModel/Agri.ReadModel.Blazor/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/${{ env.IMAGE_OWNER }}/agri-readmodel:latest
          ghcr.io/${{ env.IMAGE_OWNER }}/agri-readmodel:${{ github.sha }}
